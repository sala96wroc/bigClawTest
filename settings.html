<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sundrift — Settings</title>
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0b1f3a">
<style>
:root{--navy:#0b1f3a;--blue:#2563eb;--ink:#172033;--muted:#667085;--border:#e6eaf2}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,Arial,sans-serif;background:linear-gradient(180deg,#f3f7ff 0%, #fffaf4 100%);color:var(--ink)}
.header{position:sticky;top:0;z-index:10;background:rgba(11,31,58,.92);backdrop-filter:blur(18px);color:#fff;padding:16px 18px}.header-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.back{color:#fff;opacity:.9}.container{max-width:980px;margin:20px auto;padding:0 14px 40px}.card{background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:28px;padding:20px;box-shadow:0 16px 34px rgba(15,23,42,.07)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}.btn{padding:11px 15px;border-radius:14px;font-weight:800;border:none;cursor:pointer;font:inherit}.btn-primary{background:linear-gradient(90deg,var(--navy),var(--blue));color:#fff}.btn-secondary{background:#eef2f7;color:#223}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><a class="back" href="index.html">← Back</a><strong>Sundrift</strong></div></header>
<div class="container"><div class="card"><h2 style="margin-top:0">Settings & Backup</h2><p style="color:var(--muted);line-height:1.7">Export your trips to a JSON backup file or import them again later on the same or another device.</p><div class="actions"><button id="exportBtn" class="btn btn-primary">Export trips</button><label class="btn btn-secondary" for="importFile">Import trips</label><input id="importFile" type="file" accept="application/json" style="display:none"></div></div></div>
<script src="settings.js"></script>
</body>
</html>

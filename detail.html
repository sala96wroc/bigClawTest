<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sundrift — Trip Detail</title>
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0b1f3a">
<style>
:root{--navy:#0b1f3a;--blue:#2563eb;--ink:#172033;--muted:#667085;--border:#e6eaf2}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,Arial,sans-serif;background:linear-gradient(180deg,#f3f7ff 0%, #fffaf4 100%);color:var(--ink)}
.header{position:sticky;top:0;z-index:10;background:rgba(11,31,58,.92);backdrop-filter:blur(18px);color:#fff;padding:16px 18px}.header-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.back{color:#fff;opacity:.9}.container{max-width:980px;margin:20px auto;padding:0 14px 40px}.card{background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:28px;overflow:hidden;box-shadow:0 16px 34px rgba(15,23,42,.07)}.cover{width:100%;height:320px;object-fit:cover;background:#eef2f7}.body{padding:20px}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.chip{display:inline-flex;align-items:center;gap:6px;background:#eef5ff;color:#1849a9;padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:700}.notes{color:var(--muted);line-height:1.8;white-space:pre-wrap}.map{margin-top:16px;height:220px;border:1px solid var(--border);border-radius:20px;overflow:hidden}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{padding:10px 13px;border-radius:14px;font-weight:800;border:none;cursor:pointer;font:inherit}.btn-primary{background:linear-gradient(90deg,var(--navy),var(--blue));color:#fff}.btn-secondary{background:#eef2f7;color:#223}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.gallery img{width:100%;height:140px;object-fit:cover;border-radius:18px;border:1px solid var(--border)}@media (max-width:720px){.gallery{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><a class="back" href="index.html">← Back to trips</a><strong>Sundrift</strong></div></header>
<div class="container"><div id="app"></div></div>
<script src="detail.js"></script>
</body>
</html>
